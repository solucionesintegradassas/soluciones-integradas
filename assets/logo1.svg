<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <!-- Definitions of Gradients and Filters -->
  <defs>
    <!-- Gold Sphere Gradient (3D Shading) -->
    <radialGradient id="goldSphereGrad" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FFFDF0" />
      <stop offset="25%" stop-color="#FFDF6D" />
      <stop offset="65%" stop-color="#D4AF37" />
      <stop offset="90%" stop-color="#9A700B" />
      <stop offset="100%" stop-color="#553C00" />
    </radialGradient>

    <!-- Metallic Blue Outer Ribbon Gradient (Main body) -->
    <linearGradient id="blueRibbonOuter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="20%" stop-color="#00A8FF" />
      <stop offset="55%" stop-color="#0055D0" />
      <stop offset="85%" stop-color="#002D8C" />
      <stop offset="100%" stop-color="#001850" />
    </linearGradient>

    <!-- Metallic Blue Inner Ribbon Gradient (Backside/Shadow) -->
    <linearGradient id="blueRibbonInner" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#001850" />
      <stop offset="40%" stop-color="#002266" />
      <stop offset="80%" stop-color="#003EAA" />
      <stop offset="100%" stop-color="#001850" />
    </linearGradient>

    <!-- Ribbon Highlight Edge Gradient -->
    <linearGradient id="edgeHighlight" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E0FDFF" opacity="0.9" />
      <stop offset="50%" stop-color="#00E5FF" opacity="0.6" />
      <stop offset="100%" stop-color="#0066FF" opacity="0.1" />
    </linearGradient>

    <!-- Drop Shadow for Depth -->
    <filter id="shadowFilter" x="-20%" y="-20%" width="145%" height="145%">
      <feDropShadow dx="0" dy="12" stdDeviation="8" flood-color="#001B33" flood-opacity="0.22" />
    </filter>
  </defs>

  <style>
    .brand-title {
      font-family: 'Montserrat', 'Outfit', 'Inter', sans-serif;
      font-weight: 700;
      fill: var(--text-color, #0F172A);
      font-size: 26px;
      letter-spacing: 0.1em;
      text-anchor: middle;
      transition: fill 0.3s ease;
    }
    .brand-suffix {
      font-weight: 800;
      fill: #0077FF;
    }
    .brand-sub {
      font-family: 'Montserrat', 'Outfit', 'Inter', sans-serif;
      font-weight: 600;
      fill: #64748B;
      font-size: 14px;
      letter-spacing: 0.25em;
      text-anchor: middle;
    }
  </style>

  <!-- 3D Logo Mark -->
  <g filter="url(#shadowFilter)" transform="translate(0, -15)">
    <!-- Gold Sphere at the top -->
    <circle cx="250" cy="115" r="28" fill="url(#goldSphereGrad)" />

    <!-- Ribbon Part 1: Top Inner Curve (Recedes under the sphere) -->
    <path d="M 250,135 C 275,135 305,145 295,185 C 285,225 240,230 215,230" 
          fill="none" stroke="url(#blueRibbonInner)" stroke-width="22" stroke-linecap="round" />

    <!-- Ribbon Part 2: Middle Outer Curve (Sweeps forward from left to right) -->
    <path d="M 215,230 C 180,230 165,260 190,295 C 215,330 270,315 290,350 C 305,375 285,410 245,410" 
          fill="none" stroke="url(#blueRibbonOuter)" stroke-width="24" stroke-linecap="round" />

    <!-- Ribbon Part 3: Foreground Metallic Edge Sheen (Overlay) -->
    <path d="M 220,230 C 188,230 174,258 196,290 C 220,325 268,312 284,342" 
          fill="none" stroke="url(#edgeHighlight)" stroke-width="5" stroke-linecap="round" />
  </g>

  <!-- Company Typography -->
  <text x="250" y="445" class="brand-title">SOLUCIONES INTEGRADAS <tspan class="brand-suffix">SAS</tspan></text>
  <text x="250" y="475" class="brand-sub">NIT. 805.027.053-8</text>
</svg>
